name: Secret Scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.1"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          expected_sha="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}" -o "/tmp/${archive}"
          echo "${expected_sha}  /tmp/${archive}" | sha256sum -c -
          tar -xzf "/tmp/${archive}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan changed commits
        shell: bash
        env:
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          zero="0000000000000000000000000000000000000000"
          head="${GITHUB_SHA}"
          base=""
          log_opts=()

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              base="${PR_BASE_SHA}"
              ;;
            push)
              base="${PUSH_BEFORE}"
              ;;
          esac

          if [[ -n "${base}" && "${base}" != "${zero}" ]]; then
            git fetch --no-tags --depth=1 origin "${base}" || true
            log_opts=("${base}..${head}")
          elif git rev-parse "${head}^" >/dev/null 2>&1; then
            log_opts=("${head}^..${head}")
          else
            log_opts=("${head}" "--max-count=1")
          fi

          if [[ "$(git rev-list --count "${log_opts[@]}" 2>/dev/null || echo 1)" = "0" ]]; then
            echo "No commits to scan."
            exit 0
          fi

          echo "Scanning commits: ${log_opts[*]}"
          gitleaks git --log-opts="${log_opts[*]}" --redact=100 --exit-code=1 --no-banner --no-color
