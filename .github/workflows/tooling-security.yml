name: Tooling Security

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '23 10 * * 1'

permissions:
  contents: read

jobs:
  just-security:
    name: just security
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Install local tooling
        run: brew install just actionlint osv-scanner

      - name: Run local security gate
        run: just security
